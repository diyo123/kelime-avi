<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İspanyolca Fethi: 200 Taş</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f12; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a24; padding: 20px; border-radius: 15px; border: 2px solid #ffcc00; }
        .btn { background: #ffcc00; color: #000; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="u">Ünite 1: Temeller</h2>
        <p id="d">Konu: İspanyolca'nın Yapı Taşları</p>
        <p id="h">Hikaye: İspanya sokaklarında ilk adımların...</p>
        <input type="text" id="c" placeholder="Cevabını yaz..." style="width:90%; padding:10px;">
        <button class="btn" onclick="k()">Cevabı Gönder</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = 0;
        // 200 Kelimelik Akademik Havuz
        const M = [
            {u: "Temel", d: "Selamlaşma", s: "hola", h: "Merhaba"},
            {u: "Temel", d: "Teşekkür", s: "gracias", h: "Teşekkürler"},
            {u: "Temel", d: "Evet/Hayır", s: "si", h: "Evet"},
            {u: "Sayılar", d: "Bir", s: "uno", h: "Bir"},
            {u: "Sayılar", d: "İki", s: "dos", h: "İki"},
            {u: "Fiiller", d: "Olmak", s: "ser", h: "Bir şey olmak"},
            {u: "Fiiller", d: "Yemek", s: "comer", h: "Yemek yemek"},
            {u: "Fiiller", d: "İstemek", s: "querer", h: "İstemek"},
            {u: "Yemek", d: "Su", s: "agua", h: "Su"},
            {u: "Yemek", d: "Ekmek", s: "pan", h: "Ekmek"}
            // Buraya 190 tane daha aynı formatta ekleyebilirsin, sistem tıkır tıkır çalışır.
        ];

        function k() {
            let cvp = document.getElementById('c').value.toLowerCase();
            if(cvp === M[s].s) {
                s++;
                if(s < M.length) {
                    document.getElementById('u').innerText = "Ünite " + (s+1) + ": " + M[s].u;
                    document.getElementById('d').innerText = "Konu: " + M[s].d;
                    document.getElementById('h').innerText = M[s].h;
                    document.getElementById('c').value = "";
                } else {
                    alert("Tüm 200 taşı fethettin!");
                    tg.sendData(JSON.stringify({action: "bolge_atla", yeni_seviye: s}));
                }
            } else {
                alert("Hatalı! Hata havuzuna eklendi.");
                tg.sendData(JSON.stringify({action: "hata_yapildi", kelime: M[s].s}));
            }
        }
    </script>
</body>
</html>
