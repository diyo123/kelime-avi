<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Diyar Borak Akademi</title>
    <style>
        body { background: #0f0f12; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1a1a24; padding: 25px; border-radius: 20px; border: 2px solid #ffcc00; }
        .btn { background: #ffcc00; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="baslik">Ders Yükleniyor...</h2>
        <p id="ders" style="font-size: 1.2em;"></p>
        <div id="kontrol-paneli">
            <p id="soru"></p>
            <input type="text" id="cevap" placeholder="Cevabını yaz...">
            <br>
            <button class="btn" onclick="kontrol()">Gönder</button>
        </div>
    </div>

    <script>
        const mudredat = [
            {u: "Ünite 1: Selamlaşma", d: "İspanyolca 'Hola' ile selam verilir. 'H' harfi okunmaz.", s: "İspanyolca 'Merhaba' nedir?", c: "hola"},
            {u: "Ünite 2: Sayılar", d: "İspanyolca'da '1' sayısı 'Uno' olarak yazılır.", s: "İspanyolca '1' nedir?", c: "uno"},
            {u: "Ünite 3: Renkler", d: "İspanyolca 'Kırmızı' rengine 'Rojo' denir.", s: "İspanyolca 'Kırmızı' nedir?", c: "rojo"}
        ];
        
        let sira = 0;

        function dersiBaslat() {
            document.getElementById('baslik').innerText = mudredat[sira].u;
            document.getElementById('ders').innerText = mudredat[sira].d;
            
            // "Anladın mı?" diyalogu
            let anladinMi = confirm("Ders notunu okudun mu? Devam etmek için 'Tamam', tekrar okumak için 'İptal'e bas.");
            if(anladinMi) {
                document.getElementById('soru').innerText = mudredat[sira].s;
            } else {
                alert("Dersi başa sarıyorum...");
                dersiBaslat();
            }
        }

        function kontrol() {
            let giris = document.getElementById('cevap').value.toLowerCase();
            if(giris === mudredat[sira].c) {
                alert("Tebrikler! Sınıfı geçtin.");
                sira++;
                if(sira < mudredat.length) {
                    document.getElementById('cevap').value = "";
                    dersiBaslat();
                } else { alert("Tüm üniteleri bitirdin, şampiyon!"); }
            } else {
                alert("Yanlış! Dersi tekrar oku.");
                dersiBaslat();
            }
        }
        dersiBaslat();
    </script>
</body>
</html>
