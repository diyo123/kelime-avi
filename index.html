<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diyar-ı Borak İspanyolca Akademi</title>
    <!-- Telegram ve Konfetti Efekti İçin Gerekli Kütüphaneler -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c20, #15102a, #1f173d);
            color: white;
            text-align: center;
            margin: 0;
            padding: 15px;
            user-select: none;
            overflow-x: hidden;
        }
        h2 { color: #00d2ff; font-size: 24px; text-shadow: 0 0 10px rgba(0,210,255,0.3); margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 15px; }
        
        /* Mod Seçim Alanı */
        .mod-secici {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .mod-btn {
            background: #251c4a;
            border: 1px solid #433280;
            color: #bbb;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mod-btn.aktif {
            background: linear-gradient(45deg, #00d2ff, #0066ff);
            color: white;
            border: none;
            box-shadow: 0 0 15px rgba(0,210,255,0.4);
        }

        .skor-tabela {
            font-size: 18px;
            margin: 15px 0;
            color: #ffca28;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255,202,40,0.2);
        }

        /* Oyun Alanı */
        .oyun-alani {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 420px;
            margin: 0 auto;
        }
        .kart {
            background: #1c153a;
            border: 2px solid #322569;
            border-radius: 14px;
            padding: 22px 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            word-wrap: break-word;
        }
        .kart:hover { border-color: #00d2ff; }
        .secili {
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            color: white;
            border-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,210,255,0.4);
        }
        .dogru {
            background: linear-gradient(135deg, #2ecc71, #27ae60) !important;
            border-color: #2ecc71 !important;
            color: white !important;
            animation: dogruAnimasyon 0.5s ease forwards;
        }
        
        @keyframes dogruAnimasyon {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); opacity: 0.25; pointer-events: none; }
        }

        .bitir-btn {
            margin-top: 25px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            display: none;
            box-shadow: 0 5px 20px rgba(255,75,43,0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h2>⚡ Diyar-ı Borak Akademi</h2>
    <div class="subtitle">Modunu seç, kelimeleri eşleştir, skoru kap!</div>

    <!-- 3 FARKLI OYUN SEÇENEĞİ (MODU) -->
    <div class="mod-secici">
        <button class="mod-btn aktif" onclick="modDegistir('kelime_avi', this)">🎈 Kelime Avı</button>
        <button class="mod-btn" onclick="modDegistir('gunluk_konusma', this)">🏠 Günlük Konuşma</button>
        <button class="mod-btn" onclick="modDegistir('ask_flort', this)">💞 Aşk & Flört</button>
    </div>

    <div class="skor-tabela">🎁 Kazanılan Skor: <span id="skor">0</span> XP</div>

    <div class="oyun-alani" id="oyunAlani"></div>

    <button class="bitir-btn" id="bitirBtn" onclick="skoruBotaGonder()">Skorları Hesabıma Yükle 🏆</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        // GENİŞLETİLMİŞ VE ZENGİNLEŞTİRİLMİŞ KARŞILAŞTIRMA LİSTELERİ (HAVUZ)
        const oyunVerileri = {
            kelime_avi: [
                { esp: "Uno", tr: "Bir (1)" },
                { esp: "Cinco", tr: "Beş (5)" },
                { esp: "Diez", tr: "On (10)" },
                { esp: "Quince", tr: "On beş (15)" },
                { esp: "Veinte", tr: "Yirmi (20)" },
                { esp: "Cincuenta", tr: "Elli (50)" }
            ],
            gunluk_konusma: [
                { esp: "¡Hola!", tr: "Merhaba" },
                { esp: "Buenos días", tr: "Günaydın" },
                { esp: "Buenas noches", tr: "İyi geceler" },
                { esp: "Gracias", tr: "Teşekkürler" },
                { esp: "Por favor", tr: "Lütfen" },
                { esp: "De nada", tr: "Rica ederim" }
            ],
            ask_flort: [
                { esp: "Te amo", tr: "Seni seviyorum" },
                { esp: "Mi amor", tr: "Aşkım" },
                { esp: "Mi vida", tr: "Hayatım" },
                { esp: "Te extraño", tr: "Seni özlüyorum" },
                { esp: "Eres hermosa", tr: "Çok güzelsin" },
                { esp: "Me gustas", tr: "Senden hoşlanıyorum" }
            ]
        };

        let aktifMod = 'kelime_avi';
        let toplamSkor = 0;
        let secilenKartlar = [];
        let eslesenSayisi = 0;

        function oyunuKur(mod) {
            const alan = document.getElementById("oyunAlani");
            alan.innerHTML = ""; 
            document.getElementById("bitirBtn").style.display = "none";
            secilenKartlar = [];
            eslesenSayisi = 0;

            let mevcutHavuz = oyunVerileri[mod];
            let kartHavuzu = [];

            mevcutHavuz.forEach((k, index) => {
                kartHavuzu.push({ text: k.esp, type: 'esp', id: index });
                kartHavuzu.push({ text: k.tr, type: 'tr', id: index });
            });

            // Kartları karıştır
            kartHavuzu.sort(() => Math.random() - 0.5);

            kartHavuzu.forEach(k => {
                const div = document.createElement("div");
                div.className = "kart";
                div.innerText = k.text;
                div.dataset.id = k.id;
                div.dataset.type = k.type;
                div.onclick = () => kartSec(div);
                alan.appendChild(div);
            });
        }

        function modDegistir(yeniMod, element) {
            document.querySelectorAll('.mod-btn').forEach(btn => btn.classList.remove('aktif'));
            element.classList.add('aktif');
            aktifMod = yeniMod;
            oyunuKur(yeniMod);
        }

        function kartSec(element) {
            if (element.classList.contains('dogru') || element.classList.contains('secili')) return;

            element.classList.add('secili');
            secilenKartlar.push(element);

            if (secilenKartlar.length === 2) {
                const k1 = secilenKartlar[0];
                const k2 = secilenKartlar[1];

                if (k1.dataset.id === k2.dataset.id && k1.dataset.type !== k2.dataset.type) {
                    k1.className = "kart dogru";
                    k2.className = "kart dogru";
                    
                    // Skor artışı ve tabela güncellemesi
                    toplamSkor += 30; 
                    document.getElementById("skor").innerText = toplamSkor;
                    eslesenSayisi++;

                    // ANLIK BAŞARI KONFETİSİ (Ufak Patlama)
                    confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1 } });

                    if (eslesenSayisi === oyunVerileri[aktifMod].length) {
                        // BÜYÜK FİNAL KONFETİ YAĞMURU 🌟
                        büyükKonfetiPatlat();
                        document.getElementById("bitirBtn").style.display = "inline-block";
                    }
                } else {
                    setTimeout(() => {
                        k1.classList.remove('secili');
                        k2.classList.remove('secili');
                    }, 400);
                }
                secilenKartlar = [];
            }
        }

        // MUHTEŞEM 3 SANİYELİK COŞKULU KONFETİ REZİTALİ
        function büyükKonfetiPatlat() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function skoruBotaGonder() {
            if (tg.sendData) {
                tg.sendData(toplamSkor.toString());
            } else {
                alert("Tebrikler! Toplam Skor: " + toplamSkor + " XP kanka!");
            }
            tg.close();
        }

        // Oyunu ilk mod ile başlat
        oyunuKur('kelime_avi');
    </script>
</body>
</html>
