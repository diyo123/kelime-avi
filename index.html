<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Diyar Borak Akademi</title>
    <!-- Konfeti efekti için kütüphane -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --accent: #2a9d8f; --text: #264653; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .btn { background: var(--accent); color: white; padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        input { padding: 12px; width: 80%; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="baslik">Ders Yükleniyor...</h2>
        <p id="aciklama"></p>
        <input type="text" id="cevap" placeholder="Cevabını buraya yaz...">
        <br>
        <button class="btn" onclick="kontrol()">Cevabı Gönder</button>
    </div>

    <script>
        // Offline durum takibi
        window.addEventListener('offline', () => alert("⚠️ İnternet yok, yerel verilerdesin!"));

        const dersler = [
            {u: "Ünite 1: Alfabe", d: "İspanyolca'da 'Hola' ile selamlaşılır.", c: "hola"},
            {u: "Ünite 2: Sayılar", d: "1'den 3'e: Uno, Dos, Tres.", c: "tres"}
        ];
        
        let sira = 0;
        function guncelle() {
            document.getElementById('baslik').innerText = dersler[sira].u;
            document.getElementById('aciklama').innerText = dersler[sira].d;
        }

        function kontrol() {
            let giris = document.getElementById('cevap').value.toLowerCase();
            if(giris === dersler[sira].c) {
                // KONFETİ EFEKTİ
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                alert("Tebrikler kanka, bir ünite daha bitti!");
                sira++;
                if(sira < dersler.length) { guncelle(); } else { alert("Tüm üniteleri bitirdin, şampiyon!"); }
            } else { alert("Olmadı kanka, pes etmek yok!"); }
        }
        guncelle();
    </script>
</body>
</html>
