<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>İspanyolca Akademisi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
    <div id="ders-alani">
        <h2 id="baslik">Ders Başlıyor...</h2>
        <p id="hikaye">Yükleniyor...</p>
        <input type="text" id="cevap" placeholder="Cevabını yaz...">
        <button onclick="kontrol()">Cevabı Gönder</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const M = [
            {d: "Selamlaşma", s: "hola", h: "İspanya'da birine selam vermek için ne dersin?"},
            {d: "Teşekkür", s: "gracias", h: "Sana yardım ettiler, teşekkür et."},
            {d: "Evet/Hayır", s: "si", h: "Bir şeye onay ver."},
            {d: "Yemek", s: "pan", h: "Fransızların 'pain' dediği ekmeğe İspanyollar ne der?"},
            {d: "İçecek", s: "agua", h: "Çok susadın, su iste."}
        ];
        let s = 0;

        function guncelle() {
            document.getElementById('baslik').innerText = M[s].d;
            document.getElementById('hikaye').innerText = M[s].h;
        }

        function kontrol() {
            let val = document.getElementById('cevap').value.toLowerCase();
            if(val === M[s].s) {
                alert("Doğru! Bir sonraki seviyeye geçiyorsun.");
                s++;
                if(s < M.length) guncelle();
                else alert("Bölüm Bitti!");
            } else {
                tg.sendData(JSON.stringify({action: "hata_yapildi", kelime: M[s].s}));
                alert("Yanlış! Bu kelimeyi öğrendiğine emin ol.");
            }
        }
        guncelle();
    </script>
</body>
</html>
